<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - SIPRAS-FIP</title>
    <base target="_top" />
    <?!= include('html/components/styles'); ?>
  </head>
  <body>
    <header class="page-header">
      <div>
        <p class="eyebrow">Administrator</p>
        <h1>Dashboard Monitoring</h1>
      </div>
      <a class="button secondary" href="?">Kembali ke Beranda</a>
    </header>

    <main>
      <section class="stats-grid" id="statsGrid"></section>
      <section class="card">
        <h2>Data Terbaru</h2>
        <p>Daftar ringkasan data yang tersedia dari Google Sheets.</p>
        <div id="summaryOutput" class="summary-box"></div>
      </section>
    </main>

    <?!= include('html/components/scripts'); ?>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        google.script.run.withSuccessHandler(renderDashboard).getDashboardData();
      });

      function renderDashboard(response) {
        const statsGrid = document.getElementById('statsGrid');
        const summaryOutput = document.getElementById('summaryOutput');
        if (!response || !response.success) {
          summaryOutput.innerHTML = '<p>Data tidak tersedia.</p>';
          return;
        }

        const data = response.data;
        const cards = [
          { label: 'Gedung', value: data.buildings },
          { label: 'Lokal', value: data.rooms },
          { label: 'Fasilitas', value: data.facilities },
          { label: 'Inventaris', value: data.inventory },
          { label: 'Pengguna', value: data.users },
          { label: 'Jadwal', value: data.schedules }
        ];

        statsGrid.innerHTML = cards.map(function (card) {
          return '<article class="stat-card"><h3>' + card.label + '</h3><p class="stat-value">' + card.value + '</p></article>';
        }).join('');

        summaryOutput.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
      }
    </script>
  </body>
</html>
