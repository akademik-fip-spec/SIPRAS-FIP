<style>
  :root {
    color-scheme: light;
    --primary: #0f4c81;
    --secondary: #2f6f9f;
    --accent: #f4b400;
    --bg: #f5f7fb;
    --text: #1f2937;
    --muted: #6b7280;
    --card: #ffffff;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .hero {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    padding: 24px 20px 60px;
  }

  .top-nav, .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand {
    font-size: 1.4rem;
    font-weight: bold;
  }

  .nav-link, .button {
    text-decoration: none;
    border-radius: 999px;
    padding: 10px 16px;
    display: inline-block;
  }

  .nav-link {
    color: white;
    background: rgba(255,255,255,0.2);
  }

  .button.primary {
    background: var(--accent);
    color: #111827;
    font-weight: 700;
  }

  .button.secondary {
    background: var(--card);
    color: var(--primary);
  }

  .hero-content {
    max-width: 760px;
    margin-top: 36px;
  }

  .hero-content h1 {
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    margin-bottom: 12px;
  }

  .content-grid {
    display: grid;
    gap: 20px;
    padding: 24px 20px 40px;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  }

  .card, .stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(15, 76, 129, 0.08);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    padding: 24px 20px 0;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: bold;
    color: var(--primary);
    margin: 8px 0 0;
  }

  .summary-box {
    background: #f8fafc;
    border-radius: 12px;
    padding: 16px;
    overflow: auto;
  }

  .eyebrow {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin: 0 0 4px;
  }

  @media (max-width: 640px) {
    .hero {
      padding-bottom: 32px;
    }

    .content-grid, .stats-grid {
      padding-left: 14px;
      padding-right: 14px;
    }
  }
</style>
